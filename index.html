<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 成果報告穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #e7e5e4; }
        .a4-page { width: 210mm; min-height: 297mm; background: white; padding: 10mm; margin: 10px auto; box-shadow: 0 0 5px rgba(0,0,0,0.1); page-break-after: always; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 10px; height: 100%; }
        .photo-cell { border: 1px solid #000; padding: 5px; display: flex; flex-direction: column; }
        .img-wrapper { flex: 1; overflow: hidden; background: #eee; display: flex; align-items: center; justify-content: center; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .desc { height: 40px; border-top: 1px solid #000; padding-top: 5px; font-size: 10pt; }
        @media print { .no-print { display: none; } body { background: none; } .a4-page { margin: 0; box-shadow: none; } }
    </style>
</head>
<body>
    <div class="no-print p-4 bg-white shadow-md max-w-2xl mx-auto mt-4 rounded-lg">
        <h2 class="font-bold text-lg mb-2">排版設定 (總數: <span id="count">0</span>)</h2>
        <input type="file" id="fileInput" multiple accept="image/*" class="mb-4">
        <div class="flex gap-2">
            <button onclick="render()" class="bg-blue-600 text-white px-3 py-1 rounded">更新版面</button>
            <button onclick="downloadWord()" class="bg-green-600 text-white px-3 py-1 rounded">下載 Word</button>
        </div>
    </div>
    <div id="reportArea"></div>

    <script>
        let photos = [];
        document.getElementById('fileInput').onchange = (e) => {
            photos = [...photos, ...Array.from(e.target.files)];
            document.getElementById('count').innerText = photos.length;
        };

        async function render() {
            const area = document.getElementById('reportArea');
            area.innerHTML = '';
            for (let i = 0; i < photos.length; i += 6) {
                const page = document.createElement('div');
                page.className = 'a4-page';
                page.innerHTML = `<div class="grid-container"></div>`;
                const grid = page.querySelector('.grid-container');
                for (let j = 0; j < 6; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'photo-cell';
                    if (photos[i + j]) {
                        const b64 = await toBase64(photos[i + j]);
                        cell.innerHTML = `<div class="img-wrapper"><img src="${b64}"></div><div class="desc" contenteditable="true">說明：</div>`;
                    }
                    grid.appendChild(cell);
                }
                area.appendChild(page);
            }
        }

        function toBase64(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxW = 600; 
                        const ratio = Math.min(1, maxW / img.width);
                        canvas.width = img.width * ratio;
                        canvas.height = img.height * ratio;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        res(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function downloadWord() {
            let tableRows = '';
            for (let i = 0; i < photos.length; i += 2) {
                tableRows += `<tr>`;
                for (let j = 0; j < 2; j++) {
                    const idx = i + j;
                    if (idx < photos.length) {
                        tableRows += `<td style="width: 50%; border: 1px solid #000; padding: 10px; vertical-align: top;">
                            <img src="${document.querySelectorAll('img')[idx].src}" style="width: 100%; height: 200px; object-fit: cover;">
                            <div style="margin-top: 10px; border-top: 1px solid #000;">說明：</div>
                        </td>`;
                    } else {
                        tableRows += `<td style="width: 50%; border: 1px solid #000;"></td>`;
                    }
                }
                tableRows += `</tr>`;
            }

            const html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><style>
                    @page { size: A4; margin: 2.54cm 1.91cm; }
                    body { font-family: sans-serif; }
                    table { border-collapse: collapse; width: 100%; table-layout: fixed; }
                </style></head>
                <body><table>${tableRows}</table></body></html>`;
            
            const a = document.createElement('a');
            a.href = 'data:application/vnd.ms-word,' + encodeURIComponent(html);
            a.download = '成果報告.doc';
            a.click();
        }
    </script>
</body>
</html>
