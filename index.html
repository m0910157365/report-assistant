<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 成果報告自動分頁版 (6格版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #e7e5e4; }
        
        .a4-page {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 10mm;
            margin: 10px auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            page-break-after: always;
        }

        .page-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            height: 100%;
        }

        .photo-cell {
            display: flex;
            flex-direction: column;
            border: 1px solid #000;
            padding: 5px;
            height: 100%;
            overflow: hidden;
        }
        
        .photo-box {
            flex: 1;
            min-height: 0;
            background: #f5f5f4;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .desc-box {
            height: 40px; 
            border-top: 1px solid #000;
            padding-top: 5px;
            font-size: 10pt;
            flex-shrink: 0;
            overflow-y: auto;
        }

        @media print {
            .no-print { display: none; }
            body { background: none; }
            .a4-page { margin: 0; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="no-print p-6 bg-white shadow-lg w-full max-w-2xl mx-auto mt-4 rounded-xl">
        <h2 class="font-bold text-xl mb-4">排版設定 (每頁 6 張)</h2>
        <div class="mb-4 text-sm font-bold text-blue-700">目前已上傳照片總數：<span id="photoCount">0</span> 張</div>
        <input type="file" id="fileInput" multiple accept="image/*" class="mb-4">
        <div class="flex flex-wrap gap-2">
            <button onclick="generateReport()" class="bg-blue-600 text-white px-4 py-2 rounded">生成 / 更新報告</button>
            <button onclick="exportWord()" class="bg-green-600 text-white px-4 py-2 rounded">下載 Word 檔</button>
            <button onclick="clearAll()" class="bg-red-600 text-white px-4 py-2 rounded">清除</button>
            <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded">列印 / PDF</button>
        </div>
    </div>

    <div id="reportArea"></div>

    <script>
        let photos = [];
        const countSpan = document.getElementById('photoCount');

        document.getElementById('fileInput').addEventListener('change', (e) => {
            photos = [...photos, ...Array.from(e.target.files)];
            countSpan.innerText = photos.length;
        });

        function clearAll() {
            photos = [];
            countSpan.innerText = '0';
            document.getElementById('reportArea').innerHTML = '';
        }

        function generateReport() {
            const area = document.getElementById('reportArea');
            area.innerHTML = '';
            
            for (let i = 0; i < photos.length; i += 6) {
                const page = document.createElement('div');
                page.className = 'a4-page';
                const grid = document.createElement('div');
                grid.className = 'page-grid';
                
                for (let j = 0; j < 6; j++) {
                    const idx = i + j;
                    const cell = document.createElement('div');
                    cell.className = 'photo-cell';
                    
                    if (photos[idx]) {
                        const url = URL.createObjectURL(photos[idx]);
                        cell.innerHTML = `
                            <div class="photo-box">
                                <img src="${url}" class="w-full h-full object-cover" data-src="${url}">
                            </div>
                            <div class="desc-box" contenteditable="true">說明：</div>
                        `;
                    }
                    grid.appendChild(cell);
                }
                page.appendChild(grid);
                area.appendChild(page);
            }
        }

        async function exportWord() {
            const area = document.getElementById('reportArea');
            if (area.innerHTML === '') { alert('請先生成報告！'); return; }
            
            const container = area.cloneNode(true);
            const images = container.querySelectorAll('img');
            
            for (let img of images) {
                const dataUrl = await toBase64(img.src);
                img.src = dataUrl;
                // 設定圖片在 Word 中的固定尺寸，防止跑版
                img.style.width = "300px";
                img.style.height = "200px";
                img.style.objectFit = "cover";
            }

            // 加入 MSOffice 專屬樣式，確保頁面邊距與分頁效果
            const msoStyles = `
                <style>
                    @page { size: 210mm 297mm; margin: 20mm; }
                    .a4-page { width: 100%; height: 100%; page-break-after: always; }
                    .page-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 10px; height: 100%; }
                    .photo-cell { border: 1px solid #000; padding: 5px; height: 280px; }
                </style>
            `;

            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'>" + msoStyles + "</head><body>";
            const footer = "</body></html>";
            const sourceHTML = header + container.innerHTML + footer;
            
            const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
            const fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload);
            fileDownload.href = source;
            fileDownload.download = '成果報告.doc';
            fileDownload.click();
            document.body.removeChild(fileDownload);
        }

        function toBase64(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg'));
                };
                img.src = url;
            });
        }
    </script>
</body>
</html>
