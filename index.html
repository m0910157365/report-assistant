<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 成果報告照片排版與 AI 說明自動生成助手</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* A4 紙張模擬樣式 (供螢幕預覽用) */
        .a4-page {
            width: 210mm;
            height: 297mm;
            background: white;
            box-shadow: 0 4px 20px -2px rgba(120, 110, 90, 0.15);
            margin: 20px auto;
            padding: 20mm 20mm 15mm 20mm; /* 標準 A4 邊距 */
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 成果表格格線折疊 */
        .report-table {
            border-collapse: collapse;
            width: 100%;
        }
        .report-table td {
            border: 1.5px solid #57534e; /* 溫潤的深石色格線 */
            padding: 8px;
            vertical-align: top;
        }

        /* 印表機/列印設定 */
        @media print {
            body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .no-print {
                display: none !important;
            }
            .print-container {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
            }
            .a4-page {
                width: 210mm;
                height: 297mm;
                margin: 0 !important;
                padding: 20mm 20mm 15mm 20mm !important;
                box-shadow: none !important;
                page-break-after: always !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
            }
        }

        /* 隱藏捲軸但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 min-h-screen flex flex-col">

    <!-- 頂部導航欄 (列印時隱藏) -->
    <header class="no-print bg-gradient-to-r from-amber-700 to-orange-800 text-white shadow-md px-6 py-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center space-x-3">
            <div class="bg-white text-amber-700 p-2.5 rounded-lg shadow-inner">
                <i class="fa-solid fa-file-invoice text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-wide">A4 成果報告快速排版工具</h1>
                <p class="text-xs text-amber-100">相片極速排版 • AI 智慧生成說明 • A4 Word 匯出</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <button onclick="openLayoutModal()" class="bg-amber-600 hover:bg-amber-500 transition px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 border border-amber-500 shadow-sm">
                <i class="fa-solid fa-table-columns"></i> 版面樣式
            </button>
            <button onclick="exportToWord()" class="bg-orange-600 hover:bg-orange-500 transition px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-file-word"></i> 匯出 Word
            </button>
            <button onclick="window.print()" class="bg-stone-700 hover:bg-stone-600 transition px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-print"></i> 列印 / PDF
            </button>
        </div>
    </header>

    <!-- 主要操作區 -->
    <main class="flex-1 flex flex-col lg:flex-row min-h-[calc(100vh-76px)]">
        
        <!-- 左側：設定控制面板 (列印時隱藏) -->
        <section class="no-print w-full lg:w-[350px] bg-white border-r border-stone-200 p-5 flex flex-col justify-between shrink-0 overflow-y-auto no-scrollbar">
            <div class="space-y-5">
                <!-- 1. Gemini API 金鑰設定 -->
                <div class="bg-amber-50/70 p-3.5 rounded-xl border border-amber-200" id="apiKeySection">
                    <h3 class="text-xs font-bold text-amber-900 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                        <i class="fa-solid fa-key"></i> Gemini AI 服務金鑰
                    </h3>
                    <div class="relative">
                        <input type="password" id="apiKeyInput" placeholder="請貼上您的 AIzaSy... 金鑰" class="w-full border border-stone-300 rounded-lg pl-3 pr-8 py-1.5 text-xs focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all">
                        <button onclick="toggleKeyVisibility()" class="absolute right-2.5 top-2 text-stone-400 hover:text-stone-600">
                            <i id="keyVisibilityIcon" class="fa-solid fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>

                <!-- 2. 報告資訊設定 -->
                <div>
                    <h3 class="text-xs font-bold text-stone-500 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                        <i class="fa-solid fa-pen-to-square"></i> 報告基本資訊
                    </h3>
                    <div class="space-y-2.5 bg-stone-50 p-3 rounded-xl border border-stone-100">
                        <div>
                            <input type="text" id="reportTitle" value="115學年度活動辦理成果報告" oninput="updateDocumentDetails()" placeholder="成果報告標題" class="w-full border border-stone-300 rounded-lg px-3 py-1.5 text-xs focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none">
                        </div>
                        <div>
                            <input type="text" id="reportUnit" value="虎林國中 教務處" oninput="updateDocumentDetails()" placeholder="辦理單位" class="w-full border border-stone-300 rounded-lg px-3 py-1.5 text-xs focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="reportDate" value="115 年 4 月 28 日" oninput="updateDocumentDetails()" placeholder="日期" class="w-full border border-stone-300 rounded-lg px-3 py-1.5 text-xs focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none">
                            <select id="pageStyleSelect" onchange="updateDocumentDetails()" class="w-full border border-stone-300 rounded-lg px-2 py-1.5 text-xs outline-none bg-white">
                                <option value="style1">第 X 頁 / 共 Y 頁</option>
                                <option value="style2">頁碼：X</option>
                                <option value="none">不顯示頁碼</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 3. 排版微調 -->
                <div>
                    <h3 class="text-xs font-bold text-stone-500 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                        <i class="fa-solid fa-sliders"></i> 排版與間距
                    </h3>
                    <div class="space-y-2.5 bg-stone-50 p-3 rounded-xl border border-stone-100">
                        <div class="flex justify-between items-center text-xs">
                            <span class="text-stone-600">目前格式</span>
                            <span id="currentLayoutBadge" class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-medium">雙欄 (密集格線版)</span>
                        </div>
                        <select id="photosPerPageSelect" onchange="changePhotosPerPage(this.value)" class="w-full border border-stone-300 rounded-lg px-2 py-1.5 text-xs outline-none bg-white">
                            <option value="4" selected>單頁 4 張照片 (雙欄推薦)</option>
                            <option value="2">單頁 2 張照片 (單欄大圖)</option>
                            <option value="6">單頁 6 張照片 (超密集)</option>
                        </select>
                    </div>
                </div>

                <!-- 4. 檔案上傳 -->
                <div>
                    <div id="dropzone" class="border-2 border-dashed border-stone-300 hover:border-amber-500 bg-stone-50 hover:bg-amber-50/20 transition rounded-xl p-4 text-center cursor-pointer">
                        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleFiles(this.files)">
                        <i class="fa-solid fa-images text-2xl text-stone-400 mb-1"></i>
                        <p class="text-xs font-semibold text-stone-700">選擇或拖曳多張照片至此</p>
                    </div>

                    <div id="uploadStatus" class="mt-2 hidden">
                        <div class="flex justify-between text-[10px] text-stone-600 mb-0.5">
                            <span>相片處理中...</span>
                            <span id="uploadProgressText">0 / 0</span>
                        </div>
                        <div class="w-full bg-stone-200 rounded-full h-1">
                            <div id="uploadProgressBar" class="bg-amber-600 h-1 rounded-full transition-all duration-200" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- 5. 核心操作按鈕 -->
                <div class="pt-1">
                    <button id="generateBtn" onclick="generateAllDescriptions()" disabled class="w-full py-2.5 bg-amber-600 hover:bg-amber-700 disabled:bg-stone-300 disabled:cursor-not-allowed text-white rounded-xl text-sm font-bold flex items-center justify-center gap-1.5 shadow-md shadow-amber-100 transition-all">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> AI 批次生成說明
                    </button>
                </div>
            </div>

            <!-- 狀態列 -->
            <div class="mt-6 pt-3 border-t border-stone-100">
                <div class="flex items-center justify-between text-[10px] text-stone-400">
                    <span>AI 引擎狀態</span>
                    <span class="flex items-center gap-1 text-emerald-600 font-medium">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> 運行就緒
                    </span>
                </div>
            </div>
        </section>

        <!-- 右側：A4 預覽畫布區域 -->
        <section class="flex-1 bg-stone-200 overflow-y-auto p-4 lg:p-6 no-scrollbar relative flex flex-col items-center">
            
            <!-- A4 列印引導小幫手 (無照片時顯示) -->
            <div id="emptyState" class="my-auto text-center max-w-sm p-6 bg-white rounded-2xl shadow-md border border-stone-100 no-print">
                <div class="w-12 h-12 bg-amber-100 text-amber-700 rounded-full flex items-center justify-center mx-auto mb-3 text-lg">
                    <i class="fa-solid fa-paste"></i>
                </div>
                <h3 class="text-sm font-bold text-stone-800 mb-1">尚未上傳成果照片</h3>
                <p class="text-xs text-stone-500 leading-relaxed mb-4">
                    請點選左側「拖曳相片區域」或直接上傳照片。系統會自動幫您做好 A4 排版並自動生成精美說明。
                </p>
                <button onclick="document.getElementById('fileInput').click()" class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white rounded-lg font-semibold text-xs shadow transition">
                    立即選擇照片
                </button>
            </div>

            <!-- A4 實際渲染的頁面容器 -->
            <div id="printContainer" class="print-container w-full max-w-[210mm] hidden space-y-6">
                <!-- A4 頁面會在此處動態生成 -->
            </div>

        </section>
    </main>

    <!-- 客製化通知訊息視窗 -->
    <div id="toast" class="no-print fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300 bg-stone-900 text-white px-4 py-2.5 rounded-lg shadow-xl flex items-center gap-2">
        <span id="toastIcon" class="text-amber-400"><i class="fa-solid fa-circle-info"></i></span>
        <span id="toastMessage" class="text-xs font-medium">提示訊息</span>
    </div>

    <!-- 版面選擇 Modal -->
    <div id="layoutModal" class="no-print fixed inset-0 z-50 flex items-center justify-center bg-stone-950/50 backdrop-blur-sm px-4 hidden">
        <div class="bg-white rounded-xl max-w-md w-full p-5 shadow-xl border border-stone-100 transform scale-95 transition-all">
            <h2 class="text-base font-bold text-stone-900 mb-4 flex items-center gap-1.5">
                <i class="fa-solid fa-images text-amber-600"></i> 設定您的排版方式
            </h2>

            <div class="grid grid-cols-2 gap-4 mb-5">
                <!-- 方案 A：雙欄 (上圖下文) - 預設 -->
                <div onclick="selectLayout('grid')" id="layoutCardGrid" class="cursor-pointer border-2 border-amber-600 bg-amber-50/30 p-3 rounded-lg hover:border-amber-500 transition-all relative">
                    <div class="absolute top-2 right-2 text-amber-600 text-sm" id="layoutCheckGrid">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                    <div class="aspect-[4/3] bg-stone-100 rounded mb-2 flex flex-col justify-around p-1.5 border border-stone-200">
                        <div class="grid grid-cols-2 gap-1 flex-1">
                            <div class="bg-stone-300 rounded border border-stone-400 h-6"></div>
                            <div class="bg-stone-300 rounded border border-stone-400 h-6"></div>
                            <div class="bg-stone-300 rounded border border-stone-400 h-6"></div>
                            <div class="bg-stone-300 rounded border border-stone-400 h-6"></div>
                        </div>
                    </div>
                    <h4 class="font-bold text-stone-800 text-xs text-center">雙欄 (密集格線版)</h4>
                </div>

                <!-- 方案 B：單欄 (上圖下文) -->
                <div onclick="selectLayout('single-column')" id="layoutCardSingle" class="cursor-pointer border-2 border-stone-200 hover:border-amber-500 p-3 rounded-lg transition-all relative">
                    <div class="absolute top-2 right-2 text-stone-300 text-sm hidden" id="layoutCheckSingle">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                    <div class="aspect-[4/3] bg-stone-100 rounded mb-2 flex flex-col justify-around p-1.5 border border-stone-200">
                        <div class="flex flex-col gap-1 flex-1 justify-center">
                            <div class="bg-stone-300 rounded border border-stone-400 h-4 w-full"></div>
                            <div class="bg-stone-300 rounded border border-stone-400 h-4 w-full"></div>
                        </div>
                    </div>
                    <h4 class="font-bold text-stone-800 text-xs text-center">單欄 (密集格線版)</h4>
                </div>
            </div>

            <div class="flex justify-end gap-2 border-t border-stone-100 pt-3">
                <button onclick="closeLayoutModal()" class="px-4 py-1.5 border border-stone-300 hover:bg-stone-50 text-stone-700 rounded-lg text-xs font-medium transition">
                    取消
                </button>
                <button onclick="applySelectedLayout()" class="px-4 py-1.5 bg-amber-600 hover:bg-amber-500 text-white rounded-lg text-xs font-bold transition shadow-sm">
                    確認變更
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        // 全域狀態管理
        let uploadedPhotos = []; // 儲存所有的相片物件： { id, file, src, base64, description, status: 'idle'|'processing'|'done'|'failed' }
        let currentLayout = 'grid'; // 預設：雙欄網格 (上圖下文)
        let tempSelectedLayout = 'grid';
        let photosPerPage = 4; // 預設單頁4張照片

        // 頁面初次載入設定
        window.addEventListener('DOMContentLoaded', () => {
            // 嘗試自動帶入已儲存的金鑰
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
            }
        });

        // 導引使用者至金鑰輸入處並閃爍提示
        function focusApiKey() {
            const container = document.getElementById('apiKeySection');
            const input = document.getElementById('apiKeyInput');
            container.scrollIntoView({ behavior: 'smooth' });
            input.focus();
            
            // 閃爍效果
            container.classList.add('ring-4', 'ring-amber-400');
            setTimeout(() => {
                container.classList.remove('ring-4', 'ring-amber-400');
            }, 1500);
        }

        // 控制 API 金鑰可見度
        function toggleKeyVisibility() {
            const input = document.getElementById('apiKeyInput');
            const icon = document.getElementById('keyVisibilityIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = "fa-solid fa-eye-slash text-xs";
            } else {
                input.type = 'password';
                icon.className = "fa-solid fa-eye text-xs";
            }
        }

        // 簡易 Toast 提示控制
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMessage.textContent = message;
            
            if (type === 'success') {
                toastIcon.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-400"></i>';
            } else if (type === 'error') {
                toastIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-rose-400"></i>';
            } else if (type === 'loading') {
                toastIcon.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin text-amber-500"></i>';
            } else {
                toastIcon.innerHTML = '<i class="fa-solid fa-circle-info text-amber-500"></i>';
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            if (type !== 'loading') {
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }
        }

        function hideToast() {
            document.getElementById('toast').classList.add('translate-y-20', 'opacity-0');
        }

        // Layout Modal 控制器
        function openLayoutModal() {
            document.getElementById('layoutModal').classList.remove('hidden');
            tempSelectedLayout = currentLayout;
            highlightSelectedLayoutCard();
        }

        function closeLayoutModal() {
            document.getElementById('layoutModal').classList.add('hidden');
        }

        function selectLayout(mode) {
            tempSelectedLayout = mode;
            highlightSelectedLayoutCard();
        }

        function highlightSelectedLayoutCard() {
            const cardGrid = document.getElementById('layoutCardGrid');
            const cardSingle = document.getElementById('layoutCardSingle');
            const checkGrid = document.getElementById('layoutCheckGrid');
            const checkSingle = document.getElementById('layoutCheckSingle');

            if (tempSelectedLayout === 'grid') {
                cardGrid.className = "cursor-pointer border-2 border-amber-600 bg-amber-50/30 p-3 rounded-lg hover:border-amber-500 transition-all relative";
                cardSingle.className = "cursor-pointer border-2 border-stone-200 hover:border-amber-500 p-3 rounded-lg transition-all relative";
                checkGrid.classList.remove('hidden');
                checkSingle.classList.add('hidden');
            } else {
                cardGrid.className = "cursor-pointer border-2 border-stone-200 hover:border-amber-500 p-3 rounded-lg transition-all relative";
                cardSingle.className = "cursor-pointer border-2 border-amber-600 bg-amber-50/30 p-3 rounded-lg hover:border-amber-500 transition-all relative";
                checkGrid.classList.add('hidden');
                checkSingle.classList.remove('hidden');
            }
        }

        function applySelectedLayout() {
            currentLayout = tempSelectedLayout;
            const badge = document.getElementById('currentLayoutBadge');
            const selectPerPage = document.getElementById('photosPerPageSelect');
            
            if (currentLayout === 'grid') {
                badge.textContent = "雙欄 (密集格線版)";
                photosPerPage = 4;
                selectPerPage.value = "4";
            } else {
                badge.textContent = "單欄 (密集格線版)";
                photosPerPage = 2;
                selectPerPage.value = "2";
            }
            
            closeLayoutModal();
            showToast("排版變更成功", "success");
            renderReport();
        }

        function changePhotosPerPage(value) {
            photosPerPage = parseInt(value, 10);
            renderReport();
        }

        // 串流佇列異步讀取與無痛壓縮 (徹底防止當機)
        async function handleFiles(files) {
            if (files.length === 0) return;

            const statusContainer = document.getElementById('uploadStatus');
            const progressText = document.getElementById('uploadProgressText');
            const progressBar = document.getElementById('uploadProgressBar');

            statusContainer.classList.remove('hidden');
            progressText.textContent = `0 / ${files.length}`;
            progressBar.style.width = '0%';

            let loadedCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) continue;

                const promise = new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const originalSrc = e.target.result;
                        
                        // 將相片等比例壓縮最高 1000px，兼顧極致流暢與印刷品質
                        const compressedBase64 = await resizeImage(originalSrc, 1000);

                        uploadedPhotos.push({
                            id: 'img_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                            file: file,
                            src: compressedBase64, 
                            base64: compressedBase64.split(',')[1], 
                            description: "說明：點擊此處可手動修改、補充文字...",
                            status: 'idle'
                        });

                        loadedCount++;
                        progressText.textContent = `${loadedCount} / ${files.length}`;
                        progressBar.style.width = `${(loadedCount / files.length) * 100}%`;
                        resolve();
                    };
                    reader.readAsDataURL(file);
                });
                await promise;
            }

            setTimeout(() => {
                statusContainer.classList.add('hidden');
                document.getElementById('generateBtn').removeAttribute('disabled');
                showToast(`成功安全匯入 ${loadedCount} 張照片！`, 'success');
                renderReport();
            }, 500);
        }

        // 圖片等比例壓縮技術
        function resizeImage(dataUrl, maxDimension) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxDimension) {
                            height = Math.round((height * maxDimension) / width);
                            width = maxDimension;
                        }
                    } else {
                        if (height > maxDimension) {
                            width = Math.round((width * maxDimension) / height);
                            height = maxDimension;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.85)); 
                };
                img.src = dataUrl;
            });
        }

        // 調用 Gemini API 生成說明 (包含指數倒退與高透明度錯誤反饋)
        async function fetchGeminiDescription(base64Data, userApiKey, retryCount = 0) {
            const maxRetries = 5;
            const delay = Math.pow(2, retryCount) * 1000; 

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userApiKey}`;
                const payload = {
                    contents: [
                        {
                            parts: [
                                { 
                                    text: "這是一張學校活動或課程相片。請依據畫面中人物、背景、活動性質，自動產生一段約20字左右的中文活動成果說明。文體必須專業、正式，適合作為成果報告。注意：請務必在最開頭加上『說明：』字樣。例如：『說明：學生認真聽課，並積極進行小組合作討論。』" 
                                },
                                {
                                    inlineData: {
                                        mimeType: "image/jpeg",
                                        data: base64Data
                                    }
                                }
                            ]
                        }
                    ]
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    const errMsg = errData.error?.message || `HTTP 錯誤碼: ${response.status}`;
                    throw new Error(errMsg);
                }

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    return text.trim();
                } else {
                    throw new Error("API 回傳了無效的格式");
                }

            } catch (error) {
                if (retryCount < maxRetries) {
                    await new Promise(res => setTimeout(res, delay));
                    return await fetchGeminiDescription(base64Data, userApiKey, retryCount + 1);
                } else {
                    throw error;
                }
            }
        }

        // 批次執行 AI 說明生成
        async function generateAllDescriptions() {
            const userApiKey = document.getElementById('apiKeyInput').value.trim();
            if (!userApiKey) {
                showToast("請在左側面板最上方輸入您的 Gemini API 金鑰！", "error");
                focusApiKey();
                return;
            }

            localStorage.setItem('gemini_api_key', userApiKey);

            const idlePhotos = uploadedPhotos.filter(p => p.status === 'idle' || p.status === 'failed');
            if (idlePhotos.length === 0) {
                showToast("無待生成的照片說明", "info");
                return;
            }

            showToast("AI 辨識任務進行中...", "loading");
            document.getElementById('generateBtn').setAttribute('disabled', 'true');

            for (let photo of idlePhotos) {
                photo.status = 'processing';
                renderReport(); 
                
                try {
                    const desc = await fetchGeminiDescription(photo.base64, userApiKey);
                    photo.description = desc;
                    photo.status = 'done';
                } catch (err) {
                    console.error(err);
                    photo.status = 'failed';
                    // 核心修正：將後台拋出的具體錯誤展示給老師，方便老師除錯 (例如 API_KEY_INVALID)
                    photo.description = `說明：[AI 辨識失敗。原因: ${err.message || '金鑰錯誤或網路連線失敗'}。請點擊左側金鑰設定修正，或按此直接手動輸入說明文字。]`;
                }
                renderReport();
            }

            hideToast();
            showToast("照片說明生成任務結束", "success");
            document.getElementById('generateBtn').removeAttribute('disabled');
        }

        // 更新各個欄位資訊
        function updateDocumentDetails() {
            const title = document.getElementById('reportTitle').value || "成果報告";
            const unit = document.getElementById('reportUnit').value || "";
            const date = document.getElementById('reportDate').value || "";
            
            document.querySelectorAll('.report-main-title').forEach(el => el.textContent = title);
            document.querySelectorAll('.report-unit-text').forEach(el => el.textContent = unit);
            document.querySelectorAll('.report-date-text').forEach(el => el.textContent = date);

            const pageStyle = document.getElementById('pageStyleSelect').value;
            const pages = document.querySelectorAll('.a4-page');
            pages.forEach((page, index) => {
                const footer = page.querySelector('.page-footer-num');
                if (!footer) return;
                
                if (pageStyle === 'style1') {
                    footer.textContent = `第 ${index + 1} 頁 / 共 ${pages.length} 頁`;
                    footer.classList.remove('hidden');
                } else if (pageStyle === 'style2') {
                    footer.textContent = `頁碼：${index + 1}`;
                    footer.classList.remove('hidden');
                } else {
                    footer.classList.add('hidden');
                }
            });
        }

        // 修改單張照片說明
        function updateSingleDescription(id, value) {
            const photo = uploadedPhotos.find(p => p.id === id);
            if (photo) {
                photo.description = value;
            }
        }

        // 移除照片
        function removePhoto(id) {
            uploadedPhotos = uploadedPhotos.filter(p => p.id !== id);
            if (uploadedPhotos.length === 0) {
                document.getElementById('generateBtn').setAttribute('disabled', 'true');
            }
            renderReport();
        }

        // 調整照片排序
        function movePhoto(id, direction) {
            const index = uploadedPhotos.findIndex(p => p.id === id);
            if (index === -1) return;

            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= uploadedPhotos.length) return;

            const temp = uploadedPhotos[index];
            uploadedPhotos[index] = uploadedPhotos[targetIndex];
            uploadedPhotos[targetIndex] = temp;

            renderReport();
        }

        // 成果報告頁面渲染 (密集連續格線化 A4 版面)
        function renderReport() {
            const printContainer = document.getElementById('printContainer');

                } else {

                    for (let i = 0; i < pagePhotos.length; i += 2) {
                        const photo1 = pagePhotos[i];
                        const photo2 = pagePhotos[i+1];
                        
                        // 動態高度計算
                        const boxHeight = photosPerPage === 4 ? 'h-[160px]' : 'h-[100px]';

                        contentHTML += `<tr>`;
                        
                        // 左格
                        let statusIcon1 = '';
                        let textClass1 = 'text-stone-700';
                        if (photo1.status === 'processing') {
                            statusIcon1 = '<i class="fa-solid fa-spinner animate-spin text-amber-500 mr-1.5"></i>';
                            textClass1 = 'text-amber-600 font-medium';
                        } else if (photo1.status === 'failed') {
                            statusIcon1 = '<i class="fa-solid fa-triangle-exclamation text-rose-500 mr-1.5"></i>';
                            textClass1 = 'text-rose-500 font-medium';
                        }

                        contentHTML += `
                            <td class="w-1/2 p-2 bg-stone-50/30">
                                <div class="relative">
                                    <div class="no-print absolute top-1 right-1 flex space-x-1 bg-stone-800/80 backdrop-blur px-1.5 py-0.5 rounded shadow text-white text-[9px] z-10">
                                        <button onclick="movePhoto('${photo1.id}', -1)" class="hover:text-amber-400 px-0.5"><i class="fa-solid fa-arrow-up"></i></button>
                                        <button onclick="movePhoto('${photo1.id}', 1)" class="hover:text-amber-400 px-0.5"><i class="fa-solid fa-arrow-down"></i></button>
                                        <button onclick="removePhoto('${photo1.id}')" class="hover:text-rose-400 px-0.5"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                    
                                    <div class="w-full ${boxHeight} overflow-hidden rounded border border-stone-200 bg-stone-100 flex items-center justify-center mb-1.5">

                                    <div class="px-1">

                                            ${statusIcon1}
                                            <span>照片說明</span>
                                            ${photo1.status === 'failed' ? `<button onclick="focusApiKey()" class="ml-2 text-amber-600 hover:underline text-[9px]"><i class="fa-solid fa-key"></i> 點此設定</button>` : ''}
                                        </div>
                                        <textarea 
                                            oninput="updateSingleDescription('${photo1.id}', this.value)"

                                            placeholder="手動輸入成果說明..."
                                        >${photo1.description}</textarea>
                                    </div>
                                </div>
                            </td>
                        `;

                        // 右格
                        if (photo2) {
                            let statusIcon2 = '';
                            let textClass2 = 'text-stone-700';
                            if (photo2.status === 'processing') {
                                statusIcon2 = '<i class="fa-solid fa-spinner animate-spin text-amber-500 mr-1.5"></i>';
                                textClass2 = 'text-amber-600 font-medium';
                            } else if (photo2.status === 'failed') {
                                statusIcon2 = '<i class="fa-solid fa-triangle-exclamation text-rose-500 mr-1.5"></i>';
                                textClass2 = 'text-rose-500 font-medium';
                            }

                            contentHTML += `
                                <td class="w-1/2 p-2 bg-stone-50/30">
                                    <div class="relative">
                                        <div class="no-print absolute top-1 right-1 flex space-x-1 bg-stone-800/80 backdrop-blur px-1.5 py-0.5 rounded shadow text-white text-[9px] z-10">

                                        </div>
                                        
                                        <div class="w-full ${boxHeight} overflow-hidden rounded border border-stone-200 bg-stone-100 flex items-center justify-center mb-1.5">
                                            <img src="${photo2.src}" class="max-w-full max-h-full object-cover">
                                        </div>

                                        <div class="px-1">
                                            <div class="flex items-center text-[9px] text-stone-400 font-bold mb-0.5">
                                                ${statusIcon2}
                                                <span>照片說明</span>
                                                ${photo2.status === 'failed' ? `<button onclick="focusApiKey()" class="ml-2 text-amber-600 hover:underline text-[9px]"><i class="fa-solid fa-key"></i> 點此設定</button>` : ''}
                                            </div>
                                            <textarea 
                                                oninput="updateSingleDescription('${photo2.id}', this.value)"
                                                class="w-full bg-transparent border border-transparent hover:border-stone-300 focus:border-amber-500 focus:bg-white rounded px-1 py-0.5 text-[11px] leading-relaxed text-stone-700 outline-none resize-none transition-all cursor-pointer h-[40px] ${textClass2}"
                                                placeholder="手動輸入成果說明..."
                                            >${photo2.description}</textarea>
                                        </div>
                                    </div>
                                </td>
                            `;
                        } else {
                            // 缺項補齊格線空白格
                            contentHTML += `<td class="w-1/2 p-2 bg-stone-100/50"></td>`;
                        }

                        contentHTML += `</tr>`;
                    }
                    contentHTML += `</table>`;
                }

                const footerHTML = `
                    <div class="mt-3 border-t border-stone-300 pt-2">
                        <div class="grid grid-cols-3 items-center text-[10px] text-stone-400 font-medium">

                                <span>承辦：</span>
                                <span class="report-unit-text">${document.getElementById('reportUnit').value}</span>

        // 匯出 Word 功能 (高度相容 Microsoft Word 的原生格線 Table 結構)
        function exportToWord() {
            if (uploadedPhotos.length === 0) {
                showToast("請先上傳相片！", "error");
                return;
            }
            showToast("正在建立 Word...", "loading");

            const title = document.getElementById('reportTitle').value || "成果報告";
            const unit = document.getElementById('reportUnit').value || "";
            const date = document.getElementById('reportDate').value || "";

            let htmlContent = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <meta charset="utf-8">
                <title>${title}</title>
                <!--[if gte mso 9]>
                <xml>
                    <w:WordDocument>
                        <w:View>Print</w:View>
                        <w:Zoom>100</w:Zoom>
                        <w:DoNotOptimizeForBrowser/>
                    </w:WordDocument>
                </xml>
                <![endif]-->
                <style>
                    @page Section1 {
                        size: 595.3pt 841.9pt; /* A4 尺寸 */
                        margin: 56.7pt 56.7pt 56.7pt 56.7pt; /* 2cm 邊距 */
                        mso-header-margin: 36.0pt;
                        mso-footer-margin: 36.0pt;
                        mso-paper-source: 0;
                    }
                    div.Section1 { page: Section1; }
                    body { 
                        font-family: 'Noto Sans TC', 'Microsoft JhengHei', '微軟正黑體', sans-serif; 
                        font-size: 11pt; 
                        line-height: 1.5; 
                        color: #1e293b; 
                    }
                    .main-header {
                        border-bottom: 2px solid #000000;
                        padding-bottom: 5pt;
                        margin-bottom: 12pt;
                    }
                    .main-title {
                        font-size: 14pt;
                        font-weight: bold;
                        color: #0f172a;
                    }
                    table.report-table-word { 
                        width: 100%; 
                        border-collapse: collapse; 
                        margin-bottom: 10pt; 
                    }
                    table.report-table-word td { 
                        padding: 8pt; 
                        border: 1.5px solid #57534e; /* Word 中呈現強烈格線效果 */
                        vertical-align: top; 
                    }
                    .img-container {
                        text-align: center;
                        background-color: #f5f5f4;
                        padding: 6pt;
                        margin-bottom: 6pt;
                    }
                    .footer-table { 
                        margin-top: 15pt; 
                        border-top: 1.5px solid #cbd5e1; 
                    }
                    .footer-table td { 
                        border: none !important; 
                        padding: 6pt 0 0 0 !important; 
                        font-size: 9pt; 
                        color: #64748b; 
                        background: none !important;
                    }
                </style>
            </head>
            <body>
                <div class="Section1">
            `;

            const totalPages = Math.ceil(uploadedPhotos.length / photosPerPage);

            for (let pageIdx = 0; pageIdx < totalPages; pageIdx++) {

                    htmlContent += `<br clear=all style='mso-special-character:line-break;page-break-before:always'>`;

                htmlContent += `
                    <div class="main-header">
                        <table style="width:100%; border:none; margin:0;">
                            <tr>
                                <td style="border:none; padding:0;" align="left">
                                    <span class="main-title">${title}</span>
                                </td>
                                <td style="border:none; padding:0;" align="right">
                                    <span style="font-size:9pt; color:#64748b; font-weight:bold;">成果照片紀錄表</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                `;

                const pagePhotos = uploadedPhotos.slice(pageIdx * photosPerPage, (pageIdx + 1) * photosPerPage);

                if (currentLayout === 'single-column') {
                    // 單欄 密集格線 Word 格式
                    htmlContent += `<table class="report-table-word">`;
                    pagePhotos.forEach(photo => {
                        htmlContent += `
                            <tr>
                                <td style="padding:10pt;">
                                    <div class="img-container">
                                        <img src="${photo.src}" width="420" style="width: 420px; height: auto; display: block; margin: 0 auto; border: 1px solid #d6d3d1;" />
                                    </div>
                                    <div style="padding: 4pt 0 0 0;">
                                        <p style="font-size: 9.5pt; font-weight: bold; color: #b45309; margin: 0 0 4pt 0;">■ 成果照片說明</p>
                                        <p style="font-size: 10pt; color: #292524; margin: 0; line-height: 1.6;">${photo.description.replace(/\n/g, '<br>')}</p>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                    htmlContent += `</table>`;
                } else {
                    // 雙欄 密集格線 Word 格式 (兩行並排，照片下方緊密結合說明)
                    htmlContent += `<table class="report-table-word">`;
                    for (let i = 0; i < pagePhotos.length; i += 2) {
                        const photo1 = pagePhotos[i];
                        const photo2 = pagePhotos[i+1];

                        htmlContent += `<tr>`;
                        
                        // 第一格 (左側)
                        htmlContent += `
                            <td width="50%" style="padding:8pt; width: 250pt;">
                                <div class="img-container">
                                    <img src="${photo1.src}" width="210" style="width: 210px; height: auto; display: block; margin: 0 auto; border: 1px solid #d6d3d1;" />
                                </div>
                                <div style="padding: 4pt 0 0 0;">
                                    <p style="font-size: 9pt; font-weight: bold; color: #b45309; margin: 0 0 3pt 0;">■ 成果照片說明</p>
                                    <p style="font-size: 9.5pt; color: #292524; margin: 0; line-height: 1.5;">${photo1.description.replace(/\n/g, '<br>')}</p>
                                </div>
                            </td>
                        `;

                        // 第二格 (右側)
                        if (photo2) {
                            htmlContent += `
                                <td width="50%" style="padding:8pt; width: 250pt;">
                                    <div class="img-container">
                                        <img src="${photo2.src}" width="210" style="width: 210px; height: auto; display: block; margin: 0 auto; border: 1px solid #d6d3d1;" />
                                    </div>
                                    <div style="padding: 4pt 0 0 0;">
                                        <p style="font-size: 9pt; font-weight: bold; color: #b45309; margin: 0 0 3pt 0;">■ 成果照片說明</p>
                                        <p style="font-size: 9.5pt; color: #292524; margin: 0; line-height: 1.5;">${photo2.description.replace(/\n/g, '<br>')}</p>
                                    </div>
                                </td>
                            `;
                        } else {
                            htmlContent += `<td width="50%" style="background-color:#fafaf9; width: 250pt;"></td>`;
                        }

                        htmlContent += `</tr>`;
                    }
                    htmlContent += `</table>`;
                }

                htmlContent += `
                    <table class="footer-table">
                        <tr>
                            <td align="left" width="40%">承辦單位：${unit}</td>
                            <td align="center" width="30%">${date}</td>
                            <td align="right" width="30%">第 ${pageIdx + 1} 頁 / 共 ${totalPages} 頁</td>
                        </tr>
                    </table>
                `;
            }

            htmlContent += `
                </div>
            </body>
            </html>
            `;

            const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title}.doc`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            hideToast();
            showToast("A4 Word 下載成功！", "success");
        }
    </script>
</body>
</html>
