<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 成果報告照片排版助手 (滿版格線版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .a4-page {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 15mm;
            display: flex;
            flex-direction: column;
            margin: 10px auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        /* 核心：將單元格設為 Flex Column，文字說明自動推到底 */
        .photo-cell {
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid #000;
            padding: 4px;
        }
        .photo-box {
            flex-grow: 1; /* 照片佔據其餘空間 */
            overflow: hidden;
            background: #eee;
        }
        .desc-box {
            margin-top: 4px;
            border-top: 1px solid #000; /* 說明欄上方格線 */
            padding-top: 4px;
            font-size: 10pt;
        }
        @media print {
            .no-print { display: none; }
            body { background: none; }
            .a4-page { margin: 0; box-shadow: none; }
        }
    </style>
</head>
<body class="bg-stone-200 p-4">

    <!-- 操作面板 -->
    <div class="no-print mb-6 bg-white p-4 rounded-lg shadow max-w-2xl mx-auto">
        <h2 class="font-bold text-lg mb-4">排版設定</h2>
        <input type="file" id="fileInput" multiple accept="image/*" class="mb-4">
        <button onclick="generateReport()" class="bg-blue-600 text-white px-4 py-2 rounded">生成報告</button>
        <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded">列印 / PDF</button>
    </div>

    <div id="reportArea"></div>

    <script>
        let photos = [];
        document.getElementById('fileInput').addEventListener('change', (e) => {
            photos = Array.from(e.target.files);
        });

        function generateReport() {
            const area = document.getElementById('reportArea');
            area.innerHTML = '';
            
            // 每頁 8 張 (4行 x 2列)
            for (let i = 0; i < photos.length; i += 8) {
                const page = document.createElement('div');
                page.className = 'a4-page';
                
                let tableHtml = `<table class="w-full h-full border-collapse">`;
                for (let row = 0; row < 4; row++) {
                    tableHtml += `<tr style="height: 25%">`;
                    for (let col = 0; col < 2; col++) {
                        const idx = i + (row * 2) + col;
                        tableHtml += `<td class="w-1/2 p-1">`;
                        if (photos[idx]) {
                            const url = URL.createObjectURL(photos[idx]);
                            tableHtml += `
                                <div class="photo-cell">
                                    <div class="photo-box">
                                        <img src="${url}" class="w-full h-full object-cover">
                                    </div>
                                    <div class="desc-box">說明欄位：請在此輸入文字...</div>
                                </div>
                            `;
                        }
                        tableHtml += `</td>`;
                    }
                    tableHtml += `</tr>`;
                }
                tableHtml += `</table>`;
                page.innerHTML = tableHtml;
                area.appendChild(page);
            }
        }
    </script>
</body>
</html>
