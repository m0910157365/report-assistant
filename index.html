<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 成果報告自動分頁版 (6格版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #e7e5e4; }
        
        /* A4 頁面容器 */
        .a4-page {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 10mm;
            margin: 10px auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 防止內容溢出 */
            page-break-after: always;
        }

        /* 嚴格控制高度，改為 2 列 x 3 行 = 6 格 */
        .page-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            height: 100%;
        }

        .photo-cell {
            display: flex;
            flex-direction: column;
            border: 1px solid #000;
            padding: 5px;
            height: 100%;
            overflow: hidden;
        }
        
        .photo-box {
            flex: 1;
            min-height: 0;
            background: #f5f5f4;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .desc-box {
            height: 40px; 
            border-top: 1px solid #000;
            padding-top: 5px;
            font-size: 10pt;
            flex-shrink: 0;
            overflow-y: auto;
        }

        @media print {
            .no-print { display: none; }
            body { background: none; }
            .a4-page { margin: 0; box-shadow: none; }
        }
    </style>
</head>
<body>

    <!-- 控制面板 -->
    <div class="no-print p-6 bg-white shadow-lg w-full max-w-2xl mx-auto mt-4 rounded-xl">
        <h2 class="font-bold text-xl mb-4">排版設定 (每頁 6 張)</h2>
        <input type="file" id="fileInput" multiple accept="image/*" class="mb-4">
        <div class="flex gap-2">
            <button onclick="generateReport()" class="bg-blue-600 text-white px-4 py-2 rounded">生成 / 更新報告</button>
            <button onclick="clearAll()" class="bg-red-600 text-white px-4 py-2 rounded">清除</button>
            <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded">列印 / PDF</button>
        </div>
    </div>

    <div id="reportArea"></div>

    <script>
        let photos = [];
        document.getElementById('fileInput').addEventListener('change', (e) => {
            photos = [...photos, ...Array.from(e.target.files)];
            alert(`已上傳 ${photos.length} 張照片。`);
        });

        function clearAll() {
            photos = [];
            document.getElementById('reportArea').innerHTML = '';
        }

        function generateReport() {
            const area = document.getElementById('reportArea');
            area.innerHTML = '';
            
            // 每頁 6 格 (3行 x 2列)
            for (let i = 0; i < photos.length; i += 6) {
                const page = document.createElement('div');
                page.className = 'a4-page';
                
                const grid = document.createElement('div');
                grid.className = 'page-grid';
                
                for (let j = 0; j < 6; j++) {
                    const idx = i + j;
                    const cell = document.createElement('div');
                    cell.className = 'photo-cell';
                    
                    if (photos[idx]) {
                        const url = URL.createObjectURL(photos[idx]);
                        cell.innerHTML = `
                            <div class="photo-box">
                                <img src="${url}" class="w-full h-full object-cover">
                            </div>
                            <div class="desc-box" contenteditable="true">說明：</div>
                        `;
                    }
                    grid.appendChild(cell);
                }
                
                page.appendChild(grid);
                area.appendChild(page);
            }
        }
    </script>
</body>
</html>
